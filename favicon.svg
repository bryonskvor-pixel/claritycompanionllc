<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="6" fill="#1B2A38"/>

  <!-- Soft halo on primary star -->
  <radialGradient id="h" cx="40%" cy="62%" r="55%">
    <stop offset="0%"  stop-color="#C4B9AE" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#C4B9AE" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="13" cy="20" rx="11" ry="10" fill="url(#h)"/>

  <!-- Constellation line -->
  <line x1="22" y1="9" x2="16" y2="15"
    stroke="#BEB4AA" stroke-width="0.6" opacity="0.45"/>

  <!-- Primary star — user — large, off-white -->
  <polygon
    points="13,11 14.6,16.5 20.5,16.5 15.8,19.8 17.4,25.2 13,22 8.6,25.2 10.2,19.8 5.5,16.5 11.4,16.5"
    fill="#ECE7E0" opacity="0.97"/>

  <!-- Companion star — guide — smaller, platinum, upper right -->
  <polygon
    points="23,5 24,8 27,8 24.8,9.6 25.6,12.5 23,10.8 20.4,12.5 21.2,9.6 19,8 22,8"
    fill="#C4B9AE" opacity="0.95"/>

  <!-- Companion rays — short, delicate -->
  <line x1="23" y1="5"  x2="23" y2="2.5" stroke="#C4B9AE" stroke-width="0.6" opacity="0.4"/>
  <line x1="27" y1="6.5" x2="29" y2="4.5" stroke="#C4B9AE" stroke-width="0.55" opacity="0.32"/>
  <line x1="27.5" y1="9" x2="30" y2="9"  stroke="#C4B9AE" stroke-width="0.5" opacity="0.25"/>

  <!-- Dashed clarity ray from companion toward primary -->
  <line x1="21" y1="11" x2="17" y2="14"
    stroke="#C4B9AE" stroke-width="0.55" opacity="0.3"
    stroke-dasharray="1.5 2" stroke-linecap="round"/>
</svg>
